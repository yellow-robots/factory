name: ci
on:
  pull_request:

# One certification per PR head: cancel a superseded in-flight run when a new head is
# pushed. Keyed by ref, so it only ever cancels this PR's own older run, never another
# PR's or ref's. A superseded head's verdict has no reader (it-25).
concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v5
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v6
        with:
          python-version: "3.11"
      - name: Install deps
        run: pip install -r requirements-dev.txt
      # Parallel across the runner's cores (-n auto). The suite is process-isolated by
      # construction (per-test tmp_path homes, ephemeral ports, no shared mutable
      # fixtures), so a parallel run returns the same verdict as a serial one. Scoped to
      # tests/ so xdist never collects a stray worktree copy.
      - name: Tests
        run: pytest tests/ -n auto -q
